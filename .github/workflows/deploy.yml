name: handles-shared-components
on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# contents: read for checkout; pages/id-token for the Storybook GitHub Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    name: Deploying from ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@koralabs'

      - name: Install deps (npm)
        # The committed package-lock pins @koralabs deps to GitHub Packages and is stale
        # (missing yaml@2.9.0). Both @koralabs deps (kora-labs-common, handle-svg) are on
        # npmjs, so drop the lock and re-resolve from npmjs (scope:@koralabs above) — avoids
        # the GitHub Packages auth the retired AWS pipeline set up.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      # npm publish — direct, using the NPM_TOKEN secret. Replaces the retired
      # adahandle-deployments AWS pipeline (DEPLOYMENT_TYPE=npm-publish), whose
      # AWS security token was invalid ("UnrecognizedClientException"), so the
      # package hadn't published since. build.sh reshapes package.json to
      # main=index.js + files=["*"] and rollup emits to lib/, so publish from
      # lib/ with the reshaped manifest copied in (mirrors kora-labs-common's
      # deploy). npm publish is a no-op-safe: it fails only if the version
      # already exists, so bump package.json to release.
      - name: Publish to npm
        run: cp package.json ./lib/package.json && cd ./lib && npm publish --provenance --access public

      - name: Run Build Storybook
        run: npm run build-storybook
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./storybook-static"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
